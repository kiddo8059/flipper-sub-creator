name: "Build"

on:
    push:
        branches: ["main"]
    workflow_dispatch:

jobs:
    build:
        if: |
            github.event_name == 'workflow_dispatch' ||
            contains(github.event.head_commit.message, '--build')

        permissions:
            contents: write

        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build (Momentum)
              uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
              id: build-momentum
              with:
                  sdk-channel: dev
                  sdk-index-url: https://up.momentum-fw.dev/firmware/directory.json

            - name: Copy Momentum FAP
              run: |
                  mkdir -p dist/Momentum
                  cp ${{ steps.build-momentum.outputs.fap-artifacts }} dist/Momentum/

            - name: Build (Unleashed)
              uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
              id: build-unleashed
              with:
                  sdk-channel: dev
                  sdk-index-url: https://up.unleashedflip.com/directory.json

            - name: Copy Unleashed FAP
              run: |
                  mkdir -p dist/Unleashed
                  cp ${{ steps.build-unleashed.outputs.fap-artifacts }} dist/Unleashed/

            - name: Create archive
              run: |
                  cd dist
                  zip -r sub_creator.zip Momentum Unleashed

            - name: Generate Release Notes
              run: |
                  cat > RELEASE_NOTES.md << 'EOF'
                  ## 📥 Installation
                  1. Download the archive `sub_creator.zip`
                  2. Extract the archive.
                  3. Open the folder matching your firmware.
                  4. Inside, locate the sub_creator.fap file.
                  5. Connect your Flipper Zero to your computer.
                  6. Open qFlipper.
                  7. Copy sub_creator.fap to: `/ext/apps/Sub-GHz/`
                  8. Launch the app from: `Apps -> Sub-GHz -> Sub Creator`

                  EOF
                  cat CHANGELOG.md >> RELEASE_NOTES.md

            - name: Get app info
              id: app-info
              run: |
                  FAP_VERSION=$(grep -E "fap_version\s*=" application.fam | sed 's/.*fap_version\s*=\s*"\([^"]*\)".*/\1/' | head -1)
                  echo "fap_version=$FAP_VERSION" >> $GITHUB_OUTPUT

            - name: Create Release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ steps.app-info.outputs.fap_version }}
                  name: Sub Creator v${{ steps.app-info.outputs.fap_version }}
                  files: dist/sub_creator.zip
                  body_path: RELEASE_NOTES.md
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
